<!DOCTYPE html>
<html lang="en">
<head> 
    <title>Page 3</title> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <style> 
html {
  /* pin the gradient to the viewport so it never scrolls */
  min-height: 100%;
  background: linear-gradient(to bottom, #303030 0%, #0c0c0c 100%);
  background-attachment: fixed;
}

body {
  margin: 0;
}

.feed {
  height: 600vh;
  position: relative;
}

.feed-window {
  position: sticky;
  top: 0;

  height: 100vh;

  display: flex;
  justify-content: center; /* horizontal centre */
  align-items: center;     /* vertical centre */

  overflow: hidden;
}

.posts { 
    width: 35vw; 
    min-width: 350px; 
    max-width: 500px; 
    height: 80vh; 
    background: rgba(255,255,255,0.05); 
    
    overflow: hidden; }

.posts-inner {
  will-change: transform;
}

.post {
  width: 100%;
  height: 70vh;
  object-fit: cover;
  display: block;

}

    </style>
</head>

<body>
<section class="hero">
  <div class="wheel"></div>
</section>

<section class="feed">
<div class="feed-window">
  <div class="posts">
    <div class="posts-inner">
      <img class="post" src="./images/1.jpg">
      <img class="post" src="./images/2.jpg">
      <img class="post" src="./images/3.jpg">
    </div>
  </div>
</div>
</section>

<script>
    const feed = document.querySelector('.feed');
    const posts = document.querySelector('.posts');
    const inner = document.querySelector('.posts-inner');

    function updateScroll() {
        const feedTop = feed.offsetTop;
        const scrollRange = feed.offsetHeight - window.innerHeight; // distance the section is "sticky-active" for
        const maxTranslate = Math.max(0, inner.scrollHeight - posts.clientHeight); // how far the inner content can move

        let progress = (window.scrollY - feedTop) / scrollRange;
        progress = Math.min(Math.max(progress, 0), 1); // clamp 0..1

        inner.style.transform = `translateY(${-progress * maxTranslate}px)`;
    }

    window.addEventListener('scroll', updateScroll);
    window.addEventListener('resize', updateScroll);
    updateScroll();
</script>
</body>
</html>
